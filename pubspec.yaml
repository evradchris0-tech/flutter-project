name: discover_cameroon
description: "Guide touristique des destinations camerounaises — projet de démonstration Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1

  # State management global
  flutter_riverpod: ^2.5.1

  # Carte interactive OpenStreetMap
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Images réseau avec cache automatique (offline)
  cached_network_image: ^3.3.1

  # Requêtes HTTP robuste avec intercepteurs (remplace http)
  dio: ^5.7.0

  # Détection de la connectivité réseau
  connectivity_plus: ^6.0.3

  # ── Architecture & Clean Code ──────────────────────────────────────────────
  # Égalité structurelle sur les entités du domaine
  equatable: ^2.0.5

  # Service Locator pour l'injection de dépendances
  get_it: ^7.7.0

  # Stockage sécurisé du token JWT (Keychain iOS / EncryptedSharedPreferences Android)
  flutter_secure_storage: ^9.2.2

  # Notifications locales (déjà utilisé via NotificationService)
  flutter_local_notifications: ^17.2.4
  go_router: ^17.1.0
  geolocator: ^13.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
